---
- name: Search Secret by Name and Folder
  ansible.builtin.uri:
    url: "{{ base_url }}/api/v1/secrets?filter.searchText={{ secret_name | urlencode }}&filter.folderId={{ target_folder_id }}"
    method: GET
    headers: "{{ delinea_auth_header }}"
    status_code: [200]
    return_content: true
  register: secret_search

- name: Identify Existing Secret
  ansible.builtin.set_fact:
    target_secret: "{{ (secret_search.json.records | selectattr('name', 'equalto', secret_name) | first) | default(None) }}"

- name: Handle Absent State
  ansible.builtin.uri:
    url: "{{ base_url }}/api/v1/secrets/{{ target_secret.id }}"
    method: DELETE
    headers: "{{ delinea_auth_header }}"
    status_code: [200, 404]
  when: 
    - state == 'absent'
    - target_secret is not none

- name: Fetch Secret Stub (Template schema)
  ansible.builtin.uri:
    url: "{{ base_url }}/api/v1/secrets/stub?secretTemplateId={{ template_id }}"
    method: GET
    headers: "{{ delinea_auth_header }}"
    status_code: [200]
    return_content: true
  register: secret_stub
  when: state == 'present'

- name: Hydrate Secret Fields Pipeline
  ansible.builtin.set_fact:
    hydrated_items: >-
      [
        {% for field in secret_stub.json.items %}
          {
            "itemId": {{ field.itemId }},
            "fieldId": {{ field.fieldId }},
            "itemValue": "{{ lookup('vars', field.slug, default='') }}",
            "slug": "{{ field.slug }}"
          }{% if not loop.last %},{% endif %}
        {% endfor %}
      ]
  when: state == 'present'

- name: Create or Update Secret
  ansible.builtin.uri:
    url: "{{ base_url }}/api/v1/secrets{{ '/' + target_secret.id | string if target_secret else '' }}"
    method: "{{ 'PUT' if target_secret else 'POST' }}"
    headers: "{{ delinea_auth_header }}"
    body_format: json
    body:
      name: "{{ secret_name }}"
      folderId: "{{ target_folder_id }}"
      secretTemplateId: "{{ template_id }}"
      siteId: "{{ site_id | default(2) }}"
      items: "{{ hydrated_items }}"
    status_code: [200, 201]
    return_content: true
  register: create_update_secret
  when: state == 'present'

- name: Set target_secret_id Fact
  ansible.builtin.set_fact:
    target_secret_id: "{{ target_secret.id if target_secret else create_update_secret.json.id }}"
  when: state == 'present'
